<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <!-- Background Space Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Hoodie Gradient -->
    <linearGradient id="hoodieGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Skin Gradient -->
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fed7aa" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>

    <!-- Glasses Frame Gradient -->
    <linearGradient id="glassesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Drop Shadow for avatar depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.3" />
    </filter>

    <!-- Subtle Outer Glow -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circular Space Background -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGradient)" stroke="#4f46e5" stroke-width="6" />

  <!-- Background Space Sparkles & Stars -->
  <g opacity="0.8">
    <!-- Star 1 -->
    <path d="M 120 150 L 123 158 L 131 161 L 123 164 L 120 172 L 117 164 L 109 161 L 117 158 Z" fill="#38bdf8" />
    <!-- Star 2 -->
    <path d="M 380 120 L 382 125 L 387 127 L 382 129 L 380 134 L 378 129 L 373 127 L 378 125 Z" fill="#facc15" />
    <!-- Star 3 -->
    <path d="M 390 320 L 391 324 L 395 325 L 391 326 L 390 330 L 389 326 L 385 325 L 389 324 Z" fill="#67e8f9" />
    <!-- Tiny constellations / orbits -->
    <circle cx="100" cy="280" r="3" fill="#ffffff" opacity="0.4" />
    <circle cx="140" cy="310" r="2" fill="#ffffff" opacity="0.3" />
    <path d="M 80 260 Q 120 300 160 320" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4" />
    <!-- Planet Saturn outline -->
    <g transform="translate(340, 200) rotate(-15)" opacity="0.5">
      <ellipse cx="0" cy="0" rx="22" ry="6" fill="none" stroke="#f472b6" stroke-width="2" />
      <circle cx="0" cy="0" r="10" fill="#f472b6" />
    </g>
  </g>

  <!-- Main Avatar Body & Head (Shadow Filter applied) -->
  <g filter="url(#dropShadow)">
    
    <!-- Clothing: Hoodie Shoulders -->
    <path d="M 110 440 C 110 380, 160 330, 250 330 C 340 330, 390 380, 390 440 Z" fill="url(#hoodieGradient)" />
    
    <!-- Hoodie Strings -->
    <path d="M 235 345 L 235 385" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <circle cx="235" cy="385" r="5" fill="#facc15" />
    <path d="M 265 345 L 265 375" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <circle cx="265" cy="375" r="5" fill="#facc15" />

    <!-- Hoodie Collar Inner (Shadow effect) -->
    <path d="M 190 330 C 190 330, 250 365, 310 330 C 310 330, 250 335, 190 330 Z" fill="#c2410c" />

    <!-- Neck -->
    <rect x="225" y="275" width="50" height="60" fill="#fdba74" rx="10" />
    <!-- Neck Shadow -->
    <path d="M 225 315 C 225 315, 250 335, 275 315 L 275 330 L 225 330 Z" fill="#e28743" opacity="0.4" />

    <!-- Ears -->
    <circle cx="155" cy="225" r="22" fill="#fdba74" />
    <circle cx="155" cy="225" r="12" fill="#e28743" opacity="0.3" />
    <circle cx="345" cy="225" r="22" fill="#fdba74" />
    <circle cx="345" cy="225" r="12" fill="#e28743" opacity="0.3" />

    <!-- Face (Skin Tone) -->
    <rect x="165" y="140" width="170" height="170" rx="85" fill="url(#skinGradient)" />

    <!-- Rosy Cheeks -->
    <circle cx="195" cy="245" r="15" fill="#f43f5e" opacity="0.2" />
    <circle cx="305" cy="245" r="15" fill="#f43f5e" opacity="0.2" />

    <!-- Cute Smiling Mouth with Tongue -->
    <path d="M 220 250 Q 250 285 280 250" fill="none" stroke="#7c2d12" stroke-width="5" stroke-linecap="round" />
    <!-- Dimples -->
    <path d="M 215 248 Q 212 252 215 255" fill="none" stroke="#7c2d12" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 285 248 Q 288 252 285 255" fill="none" stroke="#7c2d12" stroke-width="2.5" stroke-linecap="round" />

    <!-- Nose -->
    <path d="M 245 220 Q 250 226 255 220" fill="none" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />

    <!-- Eyes (Behind Glasses) -->
    <!-- Left Eye -->
    <circle cx="210" cy="195" r="12" fill="#0f172a" />
    <circle cx="206" cy="190" r="4" fill="#ffffff" /> <!-- Pupil light highlight -->
    <!-- Right Eye -->
    <circle cx="290" cy="195" r="12" fill="#0f172a" />
    <circle cx="286" cy="190" r="4" fill="#ffffff" /> <!-- Pupil light highlight -->

    <!-- Cool Glasses (Teal/Cyan Dynamic Gradient) -->
    <!-- Left Frame -->
    <circle cx="210" cy="195" r="28" fill="none" stroke="url(#glassesGradient)" stroke-width="5.5" filter="url(#outerGlow)" />
    <!-- Right Frame -->
    <circle cx="290" cy="195" r="28" fill="none" stroke="url(#glassesGradient)" stroke-width="5.5" filter="url(#outerGlow)" />
    <!-- Bridge -->
    <path d="M 238 195 L 262 195" stroke="url(#glassesGradient)" stroke-width="5.5" stroke-linecap="round" />
    <!-- Temple Sidebars -->
    <path d="M 165 195 L 182 195" stroke="url(#glassesGradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M 318 195 L 335 195" stroke="url(#glassesGradient)" stroke-width="4" stroke-linecap="round" />

    <!-- Eyebrows -->
    <path d="M 190 162 Q 210 152 225 162" fill="none" stroke="#451a03" stroke-width="4" stroke-linecap="round" />
    <path d="M 275 162 Q 290 152 310 162" fill="none" stroke="#451a03" stroke-width="4" stroke-linecap="round" />

    <!-- Hair (Stylish, Playful, and Spiky 3D Look) -->
    <path d="M 160 160 
             C 145 130, 160 90, 190 85 
             C 200 65, 230 60, 250 70 
             C 270 55, 305 60, 315 80 
             C 335 85, 350 110, 345 140
             C 355 160, 345 195, 335 185
             C 330 150, 320 130, 310 135
             C 300 120, 275 110, 260 125
             C 245 110, 220 115, 205 130
             C 195 120, 175 135, 170 150 
             C 162 165, 155 175, 155 175 Z" fill="#451a03" />

    <!-- Small cute Cowlick/Tuft on top of hair for playfulness -->
    <path d="M 245 68 Q 235 45 255 35 Q 255 52 251 68" fill="#451a03" />
  </g>
</svg>
